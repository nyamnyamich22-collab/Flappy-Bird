<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Атмосферний Flappy Bird</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 320px;
            height: 480px;
            border-radius: 20px;
            box-shadow: 0 15px 60px rgba(0,0,0,0.8);
            overflow: hidden;
            background-color: #1c1124;
        }

        canvas {
            display: block;
        }

        /* Displays */
        #coinDisplay {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 22px;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 0 0 5px #000, 0 0 10px #000;
            z-index: 100;
            pointer-events: none;
        }

        #scoreDisplay {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 45px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px #8e2de2;
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 32, 39, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        #shopMenu, #leaderboardMenu {
            z-index: 20; 
        }

        .overlay h1 {
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            text-align: center;
            font-weight: 800;
        }

        .settings {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            width: 75%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .settings label {
            display: block;
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 600;
            color: #dcdde1;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #ffcc00;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.6);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(to bottom, #8e2de2, #4a00e0);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(74, 0, 224, 0.4);
            transition: all 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 0, 224, 0.6);
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(74, 0, 224, 0.4);
        }
        .btn-shop {
            background: linear-gradient(to bottom, #16a085, #1abc9c);
            box-shadow: 0 6px 20px rgba(26, 188, 156, 0.4);
        }
        .btn-shop:hover { box-shadow: 0 8px 25px rgba(26, 188, 156, 0.6); }

        .btn-leader {
            background: linear-gradient(to bottom, #d35400, #f39c12);
            box-shadow: 0 6px 20px rgba(211, 84, 0, 0.4);
        }
        .btn-leader:hover { box-shadow: 0 8px 25px rgba(211, 84, 0, 0.6); }

        .btn-danger {
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
        }

        /* Container for Lists (Shop and Leaderboard) */
        .list-container {
            width: 85%;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .list-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        /* Shop Item */
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: background 0.2s;
        }
        .shop-item:hover { background: rgba(255, 255, 255, 0.1); }
        .shop-item:last-child { margin-bottom: 0; }
        .shop-item .info { text-align: left; }
        .shop-item h3 { margin: 0; font-size: 16px; }
        .shop-item p { margin: 4px 0 0 0; font-size: 14px; color: #ccc; }
        .shop-item .price { font-weight: bold; color: #f1c40f; }

        .rare h3 { color: #5dade2; }
        .epic h3 { color: #af7ac5; text-shadow: 0 0 4px rgba(175, 122, 197, 0.5); }
        .legendary h3 { color: #f39c12; text-shadow: 0 0 8px #f39c12; }

        .item-btn {
            padding: 6px 12px;
            font-size: 13px;
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
            border-radius: 20px;
        }
        .item-btn.owned {
            background: linear-gradient(to bottom, #3498db, #2980b9);
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
        .item-btn.equipped {
            background: linear-gradient(to bottom, #95a5a6, #7f8c8d);
            box-shadow: none;
            cursor: default;
        }

        /* Leaderboard Item */
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 8px;
            border-radius: 10px;
            font-size: 16px;
        }
        .leaderboard-item:last-child { margin-bottom: 0; }
        .leaderboard-item.is-me {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.6);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
        }
        .leaderboard-item .rank { 
            width: 35px; 
            font-weight: bold; 
            color: #f1c40f; 
            text-align: left;
            font-size: 20px;
        }
        .leaderboard-item .name { 
            flex-grow: 1; 
            text-align: left; 
            font-weight: 600;
        }
        .leaderboard-item .score-val { 
            font-weight: 900; 
            color: white; 
            text-shadow: 1px 1px 2px black;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        /* Mode Selection Styles */
        .mode-btn {
            width: 100%;
            margin-bottom: 12px;
            padding: 15px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mode-btn .desc {
            font-size: 12px;
            font-weight: normal;
            opacity: 0.8;
        }
        .mode-hardcore {
            background: linear-gradient(to bottom, #FF4500, #8B0000);
            box-shadow: 0 6px 20px rgba(139, 0, 0, 0.4);
        }
        .mode-hardcore:hover {
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.6);
        }

        /* Leaderboard Toggle */
        .lb-toggle {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 4px;
            margin-bottom: 15px;
            width: 85%;
        }
        .lb-toggle button {
            flex: 1;
            padding: 8px;
            font-size: 14px;
            background: transparent;
            box-shadow: none;
            border-radius: 18px;
        }
        .lb-toggle button.active {
            background: linear-gradient(to bottom, #8e2de2, #4a00e0);
            box-shadow: 0 4px 10px rgba(74, 0, 224, 0.3);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="coinDisplay" style="display: none;">🪙 <span id="coinCount">0</span></div>
    <div id="scoreDisplay">0</div>
    
    <!-- Main Menu -->
    <div id="mainMenu" class="overlay">
        <h1 style="margin-top: -30px;" data-i18n="gameTitle">Flappy Bird</h1>
        <div class="btn-group" style="flex-direction: column; width: 220px;">
            <button id="startBtn" style="width: 100%; margin-bottom: 8px;" data-i18n="playBtn">Грати</button>
            <button id="openShopBtn" class="btn-shop" style="width: 100%; margin-bottom: 8px;" data-i18n="shopBtn">Магазин</button>
            <button id="openLeaderboardBtn" class="btn-leader" style="width: 100%; margin-bottom: 20px;" data-i18n="leaderboardBtn">🏆 Рейтинг</button>
            <button id="openSettingsBtn" style="width: 100%; background: linear-gradient(to bottom, #7f8c8d, #34495e); box-shadow: 0 6px 20px rgba(52, 73, 94, 0.4);" data-i18n="settingsTitle">⚙️ Налаштування</button>
        </div>
    </div>

    <!-- Settings Menu -->
    <div id="settingsMenu" class="overlay hidden" style="z-index: 30;">
        <h2 style="font-size: 32px; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,255,255,0.5);" data-i18n="settingsTitle">⚙️ Налаштування</h2>
        <div class="settings" style="width: 75%; padding: 20px;">
            <button id="langToggleBtn" style="padding: 8px 15px; font-size: 14px; background: rgba(255,255,255,0.1); border-radius: 8px; box-shadow: none; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; width: 100%;">🌍 Мова: UK</button>
            
            <label for="speedRange"><span data-i18n="speedLabel">Швидкість:</span> <span id="speedValue">5</span></label>
            <input type="range" id="speedRange" min="1" max="10" value="5" style="margin-bottom: 20px;">
            
            <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">
            
            <span id="userEmailSettings" style="font-size: 14px; color: #ccc; display: block; margin-bottom: 15px; font-weight: bold;">Акаунт: Гість</span>
            <button id="logoutSettingsBtn" class="btn-danger" style="width: 100%; font-size: 14px; padding: 10px;" data-i18n="logoutOrSwitchBtn">Вийти / Змінити акаунт</button>
        </div>
        <button id="closeSettingsBtn" class="btn-danger" data-i18n="backBtn">Назад</button>
    </div>

    <!-- Mode Selection Menu -->
    <div id="modeMenu" class="overlay hidden" style="z-index: 25;">
        <h2 style="font-size: 32px; margin-bottom: 25px; text-shadow: 0 0 10px rgba(255,255,255,0.5);" data-i18n="selectMode">Оберіть режим</h2>
        <div style="width: 80%;">
            <button id="chooseNormalBtn" class="mode-btn">
                <span data-i18n="modeNormal">Звичайний</span>
                <span class="desc">Gap: 130</span>
            </button>
            <button id="chooseHardcoreBtn" class="mode-btn mode-hardcore">
                <span data-i18n="modeHardcore">HARDCORE</span>
                <span class="desc">Gap: 95 + Speed ⚡</span>
            </button>
        </div>
        <button id="closeModeBtn" class="btn-danger" style="margin-top: 20px;" data-i18n="backBtn">Назад</button>
    </div>

    <!-- Shop Menu -->
    <div id="shopMenu" class="overlay hidden">
        <h2 style="font-size: 32px; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,255,255,0.5);" data-i18n="shopTitle">Магазин Скінів</h2>
        <div class="list-container" id="shopItems"></div>
        <button id="closeShopBtn" class="btn-danger" data-i18n="backBtn">Назад</button>
    </div>

    <!-- Leaderboard Menu -->
    <div id="leaderboardMenu" class="overlay hidden">
        <h2 id="lbTitle" style="font-size: 32px; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,255,255,0.5);" data-i18n="leaderboardTitle">Топ Рекордів</h2>
        
        <div class="lb-toggle">
            <button id="lbNormalTab" class="active" data-i18n="modeNormal">Звичайний</button>
            <button id="lbHardcoreTab" data-i18n="modeHardcore">HARDCORE</button>
        </div>

        <div class="list-container" id="leaderboardItems"></div>
        <button id="closeLeaderboardBtn" class="btn-danger" data-i18n="backBtn">Назад</button>
    </div>

    <!-- Auth Menu -->
    <div id="authMenu" class="overlay" style="z-index: 50; background: rgba(15, 32, 39, 0.95);">
        <h1 style="font-size: 32px;" data-i18n="authTitle">Flappy Account</h1>
        <div class="settings" style="width: 80%; padding: 25px 20px;">
            <input type="text" id="authUsername" placeholder="Логін (Нікнейм)" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 16px; box-sizing: border-box;" autocomplete="off" maxlength="15">
            <input type="password" id="authPassword" placeholder="Пароль" style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 16px; box-sizing: border-box;">
            <p id="authError" style="color: #e74c3c; font-size: 14px; display: none; margin-top: -10px; margin-bottom: 10px; font-weight: bold;"></p>
            <div class="btn-group" style="flex-direction: column;">
                <button id="loginBtn" style="width: 100%; margin-bottom: 10px;">Увійти</button>
                <button id="registerBtn" class="btn-shop" style="width: 100%; margin-bottom: 15px;">Зареєструватися</button>
                <button id="guestBtn" class="btn-leader" onclick="enterAsGuest()" style="width: 100%; opacity: 0.8; font-size: 14px;">Продовжити як Гість</button>
            </div>
        </div>
    </div>

    <!-- Game Over -->
    <div id="gameOverMenu" class="overlay hidden">
        <h1 data-i18n="gameOverTitle">Кінець гри!</h1>
        <div class="settings" style="background:transparent; margin-bottom: 20px; box-shadow: none; border: none;">
            <h2 style="font-size: 32px; margin: 0; color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.5);"><span data-i18n="scoreLabel">Рахунок:</span> <span id="finalScore">0</span></h2>
            <p style="font-size: 20px; color: #f1c40f; margin-top: 15px; font-weight: bold; text-shadow: 0 0 5px rgba(241,196,15,0.5);">+<span id="earnedCoins">0</span> 🪙 <span data-i18n="coinsEarned">монет!</span></p>
        </div>
        <div class="btn-group" style="flex-direction: column; width: 220px; gap: 0;">
            <button id="playAgainBtn" style="width: 100%; margin-bottom: 12px;" data-i18n="playAgainBtn">Грати ще</button>
            <button id="toMenuBtn" class="btn-shop" style="width: 100%; opacity: 0.9;" data-i18n="toMenuBtn">В меню</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="320" height="480"></canvas>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyDF2UjPd-V6xC6fqXTAo94Y8z8EJpD2Vuo",
      authDomain: "flappybird-603a8.firebaseapp.com",
      projectId: "flappybird-603a8",
      storageBucket: "flappybird-603a8.firebasestorage.app",
      messagingSenderId: "142737681228",
      appId: "1:142737681228:web:2bca3c195304e9eb127de9",
      measurementId: "G-5W3WK8E0VG"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const authMenu = document.getElementById('authMenu');
  const coinDisplay = document.getElementById('coinDisplay');
  const loginBtn = document.getElementById('loginBtn');
  const registerBtn = document.getElementById('registerBtn');
  const guestBtn = document.getElementById('guestBtn');
  const authUsername = document.getElementById('authUsername');
  
  const fakeDomain = "@flappy.game";
  function getFakeEmail(username) {
      return username.trim().toLowerCase().replace(/\s+/g, '_') + fakeDomain;
  }
  const authPassword = document.getElementById('authPassword');
  const authError = document.getElementById('authError');
  const userEmailSettings = document.getElementById('userEmailSettings');
  const logoutSettingsBtn = document.getElementById('logoutSettingsBtn');

  function showError(msg, color = '#e74c3c') {
      authError.innerText = msg;
      authError.style.color = color;
      authError.style.display = 'block';
  }

  loginBtn.addEventListener('click', () => {
      authError.style.display = 'none';
      if(!authUsername.value || !authPassword.value) return showError("Введіть логін та пароль");
      
      const email = getFakeEmail(authUsername.value);
      signInWithEmailAndPassword(auth, email, authPassword.value)
          .catch(error => {
              if (error.code === 'auth/invalid-credential') {
                  showError("Помилка: Неправильний логін або пароль!");
              } else {
                  showError("Помилка: " + error.message);
              }
          });
  });

  registerBtn.addEventListener('click', () => {
      authError.style.display = 'none';
      if(!authUsername.value || !authPassword.value) return showError("Введіть логін та пароль");
      
      const email = getFakeEmail(authUsername.value);
      createUserWithEmailAndPassword(auth, email, authPassword.value)
          .then(async (cred) => {
              const newData = {
                  nickname: authUsername.value.trim(),
                  coins: 0,
                  skins: ["default"],
                  eq: "default",
                  best: 0,
                  bestHardcore: 0
              };
              await setDoc(doc(db, "users", cred.user.uid), newData);
              if (window.updatePlayerData) window.updatePlayerData(newData);
          })
          .catch(error => {
              showError("Помилка: " + error.message);
          });
  });

  guestBtn.addEventListener('click', () => {
      window.isGuest = true;
      authMenu.classList.add('hidden');
      coinDisplay.style.display = 'block';
  });

  logoutSettingsBtn.addEventListener('click', () => {
      localStorage.removeItem("flappy_coins");
      localStorage.removeItem("flappy_skins");
      localStorage.removeItem("flappy_equipped");
      localStorage.removeItem("flappy_best");
      signOut(auth).then(() => location.reload());
  });

  onAuthStateChanged(auth, async (user) => {
      if (user) {
          authMenu.classList.add('hidden');
          coinDisplay.style.display = 'block';
          userEmailSettings.innerText = "Акаунт: завантаження...";
          
          try {
              const docSnap = await getDoc(doc(db, "users", user.uid));
              if (docSnap.exists()) {
                  const data = docSnap.data();
                  if (data.nickname) userEmailSettings.innerText = "Акаунт: " + data.nickname;
                  if(window.updatePlayerData) window.updatePlayerData(data);
              }
          } catch(e) {
              console.log("Firestore error", e);
          }
      } else {
          if (!window.isGuest) {
              authMenu.classList.remove('hidden');
              coinDisplay.style.display = 'none';
              userEmailSettings.innerText = 'Акаунт: Гість';
          }
      }
  });

  window.saveDataToFirebase = async function(coins, skins, eq, best, bestHardcore) {
      if (auth.currentUser) {
          try {
              await setDoc(doc(db, "users", auth.currentUser.uid), {
                  coins, skins, eq, best, bestHardcore
              }, { merge: true });
          } catch(e) {
              console.log("Firestore save error", e);
          }
      }
  };

  window.fetchGlobalLeaderboard = async function(mode = 'normal') {
      try {
          const field = mode === 'hardcore' ? "bestHardcore" : "best";
          const q = query(collection(db, "users"), orderBy(field, "desc"), limit(10));
          const querySnapshot = await getDocs(q);
          const results = [];
          querySnapshot.forEach((docSnap) => {
             let data = docSnap.data();
             let score = data[field];
             if (score && score > 0) {
                 let isMe = (auth.currentUser && docSnap.id === auth.currentUser.uid);
                 results.push({ name: data.nickname || "Гість", score: score, isMe: isMe });
             }
          });
          return results;
      } catch (e) {
          console.log("Leaderboard err", e);
          return null;
      }
  };
</script>

<script>
    // Global flag for guest mode (accessible by the Firebase module script)
    window.isGuest = false;

    // Global guest entry function — called directly from HTML onclick to avoid module scope issues
    window.enterAsGuest = function() {
        window.isGuest = true;
        const authMenu = document.getElementById('authMenu');
        const coinDisplay = document.getElementById('coinDisplay');
        if (authMenu) authMenu.classList.add('hidden');
        if (coinDisplay) coinDisplay.style.display = 'block';
    };

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // UI Elements
    const mainMenu = document.getElementById("mainMenu");
    const settingsMenu = document.getElementById("settingsMenu");
    const shopMenu = document.getElementById("shopMenu");
    const leaderboardMenu = document.getElementById("leaderboardMenu");
    const gameOverMenu = document.getElementById("gameOverMenu");
    
    const scoreDisplay = document.getElementById("scoreDisplay");
    const speedRange = document.getElementById("speedRange");
    const speedValue = document.getElementById("speedValue");
    const finalScore = document.getElementById("finalScore");
    
    const coinCountUI = document.getElementById("coinCount");
    const earnedCoinsUI = document.getElementById("earnedCoins");
    const shopItemsContainer = document.getElementById("shopItems");
    const leaderboardItemsContainer = document.getElementById("leaderboardItems");
    const lbNormalTab = document.getElementById("lbNormalTab");
    const lbHardcoreTab = document.getElementById("lbHardcoreTab");
    const lbTitle = document.getElementById("lbTitle");

    const modeMenu = document.getElementById("modeMenu");
    const chooseNormalBtn = document.getElementById("chooseNormalBtn");
    const chooseHardcoreBtn = document.getElementById("chooseHardcoreBtn");
    const closeModeBtn = document.getElementById("closeModeBtn");

    const startBtn = document.getElementById("startBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");

    function renderShop() {
        const t = translations[currentLang];
        shopItemsContainer.innerHTML = '';
        Object.values(skinsData).forEach(skin => {
            let isUnlocked = unlockedSkins.includes(skin.id);
            let isEquipped = currentSkinId === skin.id;
            
            let btnText = t.buy;
            let btnClass = "item-btn";
            
            if(isEquipped) {
                btnText = t.equipped;
                btnClass += " equipped";
            } else if(isUnlocked) {
                btnText = t.equip;
                btnClass += " owned";
            }

            let priceText = skin.price > 0 ? `🪙 ${skin.price}` : t.free;
            let skinName = t["skin_" + skin.id];
            
            let itemHTML = `
                <div class="shop-item ${skin.rarityClass}">
                    <div class="info">
                        <h3>${skinName}</h3>
                        <p class="price">${isUnlocked ? t.owned_label : priceText}</p>
                    </div>
                    <button class="${btnClass}" onclick="buyOrEquip('${skin.id}')">${btnText}</button>
                </div>
            `;
            shopItemsContainer.innerHTML += itemHTML;
        });
    }

    let currentLBMode = 'normal';

    async function renderLeaderboard(silent = false) {
        const t = translations[currentLang];
        
        if (currentLBMode === 'hardcore') {
            lbTitle.innerText = t.hardcoreTitle || "Hardcore Ranking";
        } else {
            lbTitle.innerText = t.leaderboardTitle;
        }

        if (!silent) {
            leaderboardItemsContainer.innerHTML = '<div style="text-align:center; padding: 20px; color: white;">Завантаження...</div>';
        }
        
        let combined = [];
        let fetchedFromFirebase = false;

        if (window.fetchGlobalLeaderboard) {
            let fetched = await window.fetchGlobalLeaderboard(currentLBMode);
            if (fetched && fetched.length > 0) {
                combined = fetched;
                fetchedFromFirebase = true;
            }
        }
        
        if (!fetchedFromFirebase) {
            // Only show bots for Normal mode. Hardcore should stay clean/empty if no real accounts yet.
            if (currentLBMode === 'normal') {
                combined = [...defaultLeaderboard];
            } else {
                combined = []; // No bots for hardcore
            }
        }

        // Check if I am already in the top 10 fetched
        let myRecordInTop = combined.some(e => e.isMe);
        let personalBest = currentLBMode === 'hardcore' ? myBestScoreHC : myBestScore;

        if (!myRecordInTop && personalBest > 0) {
            combined.push({ 
                name: t.youRecord || "Ви (Ваш рекорд)", 
                score: personalBest, 
                isMe: true 
            });
        }
        
        // Final sort to place 'You' correctly if we just added it, or keep the list correct
        combined.sort((a,b) => b.score - a.score);
        
        leaderboardItemsContainer.innerHTML = '';
        combined.forEach((entry, index) => {
            let rankMedal = `${index + 1}.`;
            if (index === 0) rankMedal = "🥇";
            if (index === 1) rankMedal = "🥈";
            if (index === 2) rankMedal = "🥉";
            
            let displayName = entry.name;
            // Only add suffix if it's not already clear
            if (entry.isMe && !displayName.includes("Ви") && !displayName.includes("You")) {
                displayName += " (Ви)";
            }

            let itemHTML = `
                <div class="leaderboard-item ${entry.isMe ? 'is-me' : ''}">
                    <div class="rank">${rankMedal}</div>
                    <div class="name" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${displayName}</div>
                    <div class="score-val">${entry.score}</div>
                </div>
            `;
            leaderboardItemsContainer.innerHTML += itemHTML;
        });
    }

    window.buyOrEquip = function(id) {
        const t = translations[currentLang];
        let skin = skinsData[id];
        let isUnlocked = unlockedSkins.includes(id);

        if (isUnlocked) {
            currentSkinId = id;
            localStorage.setItem("flappy_equipped", currentSkinId);
        } else {
            if (coins >= skin.price) {
                coins -= skin.price;
                unlockedSkins.push(id);
                currentSkinId = id;
                localStorage.setItem("flappy_coins", coins);
                localStorage.setItem("flappy_skins", JSON.stringify(unlockedSkins));
                localStorage.setItem("flappy_equipped", currentSkinId);
                coinCountUI.innerText = coins;
            } else {
                alert(t.noFunds);
                return;
            }
        }
        if(window.saveDataToFirebase) window.saveDataToFirebase(coins, unlockedSkins, currentSkinId, myBestScore, myBestScoreHC);
        renderShop();
    }

    function flapLogic() {
        if(state.current === state.game) {
            bird.flap();
        }
    }

    function updateSpeedLogic() {
        if (currentGameMode === 'hardcore') {
            // Hardcore: TOTALLY FIXED high difficulty, ignores slider
            pipes.gap = 90;
            pipes.dx = 4.0; 
            bird.gravity = 0.32;
            pipes.spawnInterval = 60; // frequent pipes
        } else {
            // Normal: Respects slider
            pipes.gap = 130;
            pipes.dx = 1.0 + (gameSpeedLevel * 0.35); 
            bird.gravity = 0.15 + (gameSpeedLevel * 0.015);
            pipes.spawnInterval = Math.max(50, Math.floor(180 / pipes.dx));
        }
    }

    // Графіка і Логіка
    const bird = {
        radius: 12, 
        x: 60,
        y: 200,
        speed: 0,
        gravity: 0.25,
        jump: 4.6,
        rotation: 0,
        
        draw: function() {
            let skin = skinsData[currentSkinId];
            const flapUp = (state.current === state.menu) ? (Math.sin(frames * 0.2) > 0) : (this.speed < 0 && (frames % 10 < 5));
            const t = frames; // shorthand for animation time

            ctx.save();
            ctx.translate(this.x, this.y);
            if(state.current === state.game || state.current === state.over) {
                this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.speed * 0.1)));
            } else {
                this.rotation = 0;
            }
            ctx.rotate(this.rotation);

            // ============================================================
            //  HELPER: draw a standard eye (used by most skins)
            // ============================================================
            const drawEye = (ex, ey, er, pupilColor = 'black', highlight = true) => {
                ctx.fillStyle = 'white';
                ctx.strokeStyle = 'rgba(0,0,0,0.7)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = pupilColor;
                ctx.beginPath(); ctx.arc(ex+1, ey, er*0.48, 0, Math.PI*2); ctx.fill();
                if(highlight) {
                    ctx.fillStyle = 'rgba(255,255,255,0.85)';
                    ctx.beginPath(); ctx.arc(ex-0.5, ey-1.2, er*0.22, 0, Math.PI*2); ctx.fill();
                }
            };

            // ============================================================
            //  CLASSIC (default) — warm golden bird, feather detail
            // ============================================================
            if(skin.id === 'default') {
                // Drop shadow
                ctx.shadowColor = 'rgba(0,0,0,0.35)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 3;

                // Tail — two layered feathers
                ctx.fillStyle = '#d35400';
                ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-20,-7); ctx.lineTo(-16,0); ctx.lineTo(-20,7); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#e67e22';
                ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-17,-3); ctx.lineTo(-16,0); ctx.lineTo(-17,3); ctx.closePath(); ctx.fill();

                ctx.shadowColor = 'transparent';

                // Body gradient
                let bg = ctx.createRadialGradient(-4,-4,1,0,0,14);
                bg.addColorStop(0,'#fff5b0'); bg.addColorStop(0.35,'#f1c40f'); bg.addColorStop(1,'#d4a017');
                ctx.fillStyle = bg; ctx.strokeStyle = 'rgba(0,0,0,0.65)'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.ellipse(0,0,14,11,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

                // Feather highlight band
                ctx.fillStyle = 'rgba(255,255,200,0.30)';
                ctx.beginPath(); ctx.ellipse(-2,-3,9,5,-0.3,0,Math.PI*2); ctx.fill();

                // Belly
                ctx.fillStyle = '#f39c12'; ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.ellipse(1,4,9,6,0,0,Math.PI,false); ctx.fill(); ctx.stroke();

                // Wing
                ctx.save(); ctx.translate(-2,1);
                if(flapUp) ctx.rotate(-Math.PI/4); else ctx.rotate(Math.PI/8);
                let wg = ctx.createRadialGradient(0,0,1,0,0,9);
                wg.addColorStop(0,'#f8d347'); wg.addColorStop(1,'#c57d00');
                ctx.fillStyle = wg; ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.ellipse(0,0,9,5,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
                // feather lines
                ctx.strokeStyle = 'rgba(180,100,0,0.5)';
                ctx.beginPath(); ctx.moveTo(-3,-1); ctx.lineTo(5,1); ctx.moveTo(-2,1); ctx.lineTo(4,3); ctx.stroke();
                ctx.restore();

                // Beak — double-part with nostrils
                ctx.fillStyle = '#e74c3c'; ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(11,-3); ctx.lineTo(21,-1); ctx.lineTo(14,1); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#c0392b';
                ctx.beginPath(); ctx.moveTo(11,0); ctx.lineTo(21,0); ctx.lineTo(14,5); ctx.closePath(); ctx.fill(); ctx.stroke();
                // nostril
                ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.arc(14,-1.5,1,0,Math.PI*2); ctx.fill();

                drawEye(6,-4,5);
            }

            // ============================================================
            //  RARE (Ice) — icy-blue bird with crystal spikes
            // ============================================================
            else if(skin.id === 'rare') {
                ctx.shadowColor = '#85c1e9'; ctx.shadowBlur = 10;

                // Ice tail shards
                const iceTailColors = ['#2874a6','#3498db','#aed6f1'];
                [[-10,0,-20,-9,-17,2],[-10,1,-20,7,-15,-1]].forEach((p,i)=>{
                    ctx.fillStyle = iceTailColors[i];
                    ctx.strokeStyle = 'rgba(180,220,255,0.6)'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(p[0],p[1]); ctx.lineTo(p[2],p[3]); ctx.lineTo(p[4],p[5]); ctx.closePath();
                    ctx.fill(); ctx.stroke();
                });

                ctx.shadowColor = 'transparent';

                // Body
                let ibg = ctx.createRadialGradient(-4,-5,1,0,0,15);
                ibg.addColorStop(0,'#dff3ff'); ibg.addColorStop(0.4,'#85c1e9'); ibg.addColorStop(1,'#1a5276');
                ctx.fillStyle = ibg; ctx.strokeStyle = '#1a5276'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.ellipse(0,0,14,11,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

                // Ice shimmer lines on body
                ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(-8,-6); ctx.lineTo(-2,-9); ctx.moveTo(0,-8); ctx.lineTo(5,-11); ctx.stroke();

                // Belly
                ctx.fillStyle = '#d6eaf8'; ctx.strokeStyle = '#3498db'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.ellipse(1,4,9,6,0,0,Math.PI,false); ctx.fill(); ctx.stroke();

                // Crystal spikes on top
                const spikePositions = [[-5,-11],[-1,-13],[3,-11]];
                spikePositions.forEach(sp => {
                    let sg = ctx.createLinearGradient(sp[0],sp[1],sp[0],sp[1]-6);
                    sg.addColorStop(0,'#aed6f1'); sg.addColorStop(1,'rgba(255,255,255,0.9)');
                    ctx.fillStyle = sg; ctx.strokeStyle = '#5dade2'; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(sp[0]-2,sp[1]); ctx.lineTo(sp[0],sp[1]-7); ctx.lineTo(sp[0]+2,sp[1]); ctx.closePath();
                    ctx.fill(); ctx.stroke();
                });

                // Wing
                ctx.save(); ctx.translate(-2,1);
                if(flapUp) ctx.rotate(-Math.PI/4); else ctx.rotate(Math.PI/8);
                let iwg = ctx.createLinearGradient(-8,-4,8,4);
                iwg.addColorStop(0,'#aed6f1'); iwg.addColorStop(1,'#2980b9');
                ctx.fillStyle = iwg; ctx.strokeStyle = '#1a5276'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.ellipse(0,0,9,5,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
                // frost pattern
                ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1;

                ctx.fillStyle='#d4ac0d'; ctx.beginPath(); ctx.arc(7,-4,3.5,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='rgba(0,0,0,0.9)'; ctx.beginPath(); ctx.arc(7,-4,1.8,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='rgba(255,255,150,0.85)'; ctx.beginPath(); ctx.arc(5.5,-5.5,1.2,0,Math.PI*2); ctx.fill();

                // Wing — golden fan
                ctx.save(); ctx.translate(-2,1);
                if(flapUp) ctx.rotate(-Math.PI/4); else ctx.rotate(Math.PI/8);
                let gwg = ctx.createLinearGradient(-9,-5,9,5);
                gwg.addColorStop(0,'#fff176'); gwg.addColorStop(0.5,'#f1c40f'); gwg.addColorStop(1,'#9a7700');
                ctx.fillStyle=gwg; ctx.strokeStyle='rgba(80,60,0,0.7)'; ctx.lineWidth=1;
                ctx.beginPath(); ctx.ellipse(0,0,9,5,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
                // feather lines
                ctx.strokeStyle='rgba(100,80,0,0.4)';
                ctx.beginPath(); ctx.moveTo(-4,-1); ctx.lineTo(5,1); ctx.moveTo(-3,1); ctx.lineTo(4,3); ctx.stroke();
                // wing sheen
                ctx.fillStyle='rgba(255,255,200,0.35)';
                ctx.beginPath(); ctx.ellipse(-1,-1,5,2.5,-0.3,0,Math.PI*2); ctx.fill();
                ctx.restore();

                // Beak — platinum gold
                let beakG = ctx.createLinearGradient(11,-3,22,5);
                beakG.addColorStop(0,'#fff200'); beakG.addColorStop(0.5,'#f39c12'); beakG.addColorStop(1,'#d35400');
                ctx.fillStyle=beakG; ctx.strokeStyle='rgba(80,40,0,0.7)'; ctx.lineWidth=1;
                ctx.beginPath(); ctx.moveTo(11,-3); ctx.lineTo(21,-1); ctx.lineTo(14,1); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle='rgba(255,255,200,0.4)';
                ctx.beginPath(); ctx.moveTo(11,-3); ctx.lineTo(19,-2); ctx.lineTo(14,0); ctx.closePath(); ctx.fill();
                ctx.fillStyle='#d35400'; ctx.strokeStyle='rgba(80,40,0,0.7)';
                ctx.beginPath(); ctx.moveTo(11,0); ctx.lineTo(21,0); ctx.lineTo(14,5); ctx.closePath(); ctx.fill(); ctx.stroke();
            }

            ctx.restore();
        },
        
        flap: function() {
            this.speed = -this.jump;
        },
        
        update: function() {
            if(state.current !== state.game && state.current !== state.over) return;
            
            this.speed += this.gravity;
            this.y += this.speed;
            
            if(this.y + this.radius >= canvas.height - fg.h) {
                this.y = canvas.height - fg.h - this.radius;
                if(state.current !== state.over) gameOver();
            }
            
            if(this.y - this.radius <= 0) {
                this.y = this.radius;
                this.speed = 0;
            }
        },
        reset: function() {
            this.y = 200;
            this.speed = 0;
            this.rotation = 0;
        }
    };

    const pipes = {
        position: [],
        w: 55,
        h: 400,
        gap: 130, 
        dx: 2.5,
        spawnInterval: 100,
        
        draw: function() {
            for(let i = 0; i < this.position.length; i++) {
                let p = this.position[i];
                let topYPos = p.y;
                let bottomYPos = p.y + this.h + this.gap;
                
                // =============================================
                //  SUPER CARTOONY PIPES 🍄
                // =============================================
                let isMov = p.isMoving;
                
                // Vibrant Cartoon Palette
                let c_main  = isMov ? "#FF8C00" : "#22E868"; // vivid base
                let c_light = isMov ? "#FFD700" : "#AAFFBB"; // bright highlight
                let c_dark  = isMov ? "#B85000" : "#12843A"; // deep shadow
                let c_rim   = isMov ? "#FF4500" : "#00C040"; // rim color
                let c_rivet = isMov ? "#CC6600" : "#0A6628"; // rivet color
                
                ctx.save();
                
                // ---- Helper: rounded rect fill ----
                const rRect = (x, y, w, h, r) => {
                    r = Math.min(r, w/2, h/2);
                    ctx.beginPath();
                    ctx.moveTo(x + r, y);
                    ctx.arcTo(x+w, y,   x+w, y+h, r);
                    ctx.arcTo(x+w, y+h, x,   y+h, r);
                    ctx.arcTo(x,   y+h, x,   y,   r);
                    ctx.arcTo(x,   y,   x+w, y,   r);
                    ctx.closePath();
                };

                // ---- Draw one pipe segment ----
                const drawSeg = (x, y, w, h) => {
                    // Shadow blob behind pipe
                    ctx.save();
                    ctx.globalAlpha = 0.18;
                    ctx.fillStyle = "#000";
                    rRect(x+5, y+5, w, h, 6);
                    ctx.fill();
                    ctx.restore();

                    // Base body
                    ctx.fillStyle = c_main;
                    rRect(x, y, w, h, 4);
                    ctx.fill();

                    // Right edge dark shadow strip
                    ctx.save();
                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = c_dark;
                    ctx.fillRect(x + w - w*0.18, y, w*0.18, h);
                    ctx.restore();

                    // Left highlight strip
                    ctx.fillStyle = c_light;
                    ctx.fillRect(x + w*0.14, y, w*0.13, h);

                    // Bright gloss strip
                    ctx.fillStyle = "rgba(255,255,255,0.55)";
                    ctx.fillRect(x + w*0.2, y, w*0.07, h);

                    // Thin inner seam lines (cartoon detail)
                    ctx.strokeStyle = c_dark;
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(x + w*0.75, y); ctx.lineTo(x + w*0.75, y+h);
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    // Bold black outline
                    ctx.strokeStyle = "#000";
                    ctx.lineWidth = 3.5;
                    rRect(x, y, w, h, 4);
                    ctx.stroke();
                };

                // ---- Draw a pipe CAP (wider, rounded top/bottom) ----
                const drawCap = (x, y, w, h, isTopCap) => {
                    let r = isTopCap ? [0, 0, 7, 7] : [7, 7, 0, 0];

                    // Drop shadow
                    ctx.save();
                    ctx.globalAlpha = 0.2;
                    ctx.fillStyle = "#000";
                    rRect(x+4, y+5, w, h, 7);
                    ctx.fill();
                    ctx.restore();

                    // Base fill
                    ctx.fillStyle = c_rim;
                    rRect(x, y, w, h, 7);
                    ctx.fill();

                    // Lighter center gradient
                    let rimGrad = ctx.createLinearGradient(x, y, x+w, y);
                    rimGrad.addColorStop(0, c_dark);
                    rimGrad.addColorStop(0.25, c_light);
                    rimGrad.addColorStop(0.55, "rgba(255,255,255,0.6)");
                    rimGrad.addColorStop(0.75, c_main);
                    rimGrad.addColorStop(1, c_dark);
                    ctx.fillStyle = rimGrad;
                    rRect(x, y, w, h, 7);
                    ctx.fill();

                    // Oval gloss blob (classic cartoon shine)
                    ctx.save();
                    let glossX = x + w*0.2, glossY = isTopCap ? y+3 : y+3;
                    ctx.globalAlpha = 0.7;
                    ctx.fillStyle = "rgba(255,255,255,0.75)";
                    ctx.beginPath();
                    ctx.ellipse(glossX, glossY + h*0.35, w*0.12, h*0.22, -0.3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();

                    // Rivet bolts (2 bolts per cap)
                    ctx.fillStyle = c_rivet;
                    ctx.strokeStyle = "#000";
                    ctx.lineWidth = 1.5;
                    const rivetY = y + h/2;
                    [x + w*0.18, x + w*0.82].forEach(rx => {
                        ctx.beginPath(); ctx.arc(rx, rivetY, 3.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                        // rivet shine
                        ctx.fillStyle = "rgba(255,255,255,0.7)";
                        ctx.beginPath(); ctx.arc(rx-1, rivetY-1, 1.2, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = c_rivet;
                    });

                    // Bold outline
                    ctx.strokeStyle = "#000";
                    ctx.lineWidth = 3.5;
                    rRect(x, y, w, h, 7);
                    ctx.stroke();
                };

                // ---- Leaf decoration (only on normal pipes) ----
                const drawLeaf = (lx, ly, flip) => {
                    ctx.save();
                    ctx.translate(lx, ly);
                    if(flip) ctx.scale(-1,1);
                    let leafGrad = ctx.createLinearGradient(-8,-4,6,4);
                    leafGrad.addColorStop(0,"#6EFF6E");
                    leafGrad.addColorStop(1,"#009930");
                    ctx.fillStyle = leafGrad;
                    ctx.strokeStyle = "#000"; ctx.lineWidth = 1.8;
                    ctx.beginPath();
                    ctx.moveTo(0,0); ctx.bezierCurveTo(-10,-14,10,-18,12,-4);
                    ctx.bezierCurveTo(10,4,0,6,0,0);
                    ctx.closePath();
                    ctx.fill(); ctx.stroke();
                    ctx.restore();
                };

                const PW = this.w, capW = this.w + 10;
                const capH = 26;

                // ======= TOP PIPE =======
                drawSeg(p.x, topYPos, PW, this.h - capH);
                drawCap(p.x - 5, topYPos + this.h - capH, capW, capH, false); // cap faces down
                // Leaves on normal green pipes near the mouth
                if(!isMov) {
                    drawLeaf(p.x - 5, topYPos + this.h - capH + 4, false);
                    drawLeaf(p.x + PW + 5, topYPos + this.h - capH + 4, true);
                }

                // ======= BOTTOM PIPE =======
                drawSeg(p.x, bottomYPos + capH, PW, this.h - capH);
                drawCap(p.x - 5, bottomYPos, capW, capH, true); // cap faces up
                if(!isMov) {
                    drawLeaf(p.x - 5, bottomYPos + capH - 4, false);
                    drawLeaf(p.x + PW + 5, bottomYPos + capH - 4, true);
                }

                ctx.restore();

                if (p.hasStar && !p.starCollected) {
                    ctx.save();
                    let sx = p.x + this.w / 2;
                    let sy = p.y + this.h + this.gap / 2;
                    ctx.translate(sx, sy);
                    let pulse = 1 + Math.sin(frames * 0.12) * 0.18;
                    ctx.scale(pulse, pulse);

                    if (p.starType === 'coin') {
                        // 🟡 Coin — yellow spinning circle with $ symbol
                        ctx.shadowColor = "#f1c40f"; ctx.shadowBlur = 12;
                        ctx.fillStyle = "#f1c40f";
                        ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "#d4a017";
                        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "rgba(255,255,255,0.5)";
                        ctx.beginPath(); ctx.arc(-2, -3, 3, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "#7B5800";
                        ctx.font = "bold 9px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
                        ctx.fillText("🪙", 0, 1);
                        ctx.strokeStyle = "#8B6914"; ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.stroke();

                    } else if (p.starType === 'diamond') {
                        // 💎 Diamond — cyan faceted gem
                        ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 18;
                        let dg = ctx.createLinearGradient(-11, -14, 11, 14);
                        dg.addColorStop(0, "#e0f7fa");
                        dg.addColorStop(0.3, "#00e5ff");
                        dg.addColorStop(0.7, "#0077b6");
                        dg.addColorStop(1, "#023e8a");
                        ctx.fillStyle = dg;
                        ctx.strokeStyle = "#00bcd4"; ctx.lineWidth = 1.5;
                        // Diamond shape
                        ctx.beginPath();
                        ctx.moveTo(0, -14);   // top point
                        ctx.lineTo(11, -4);   // top-right
                        ctx.lineTo(11, 4);    // mid-right
                        ctx.lineTo(0, 14);    // bottom point
                        ctx.lineTo(-11, 4);   // mid-left
                        ctx.lineTo(-11, -4);  // top-left
                        ctx.closePath();
                        ctx.fill(); ctx.stroke();
                        // Facet lines
                        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(0,-14); ctx.lineTo(0,14);
                        ctx.moveTo(-11,-4); ctx.lineTo(11,-4);
                        ctx.stroke();
                        // Glint
                        ctx.fillStyle = "rgba(255,255,255,0.8)";
                        ctx.beginPath(); ctx.ellipse(-3,-7,3,2,-0.5,0,Math.PI*2); ctx.fill();

                    } else {
                        // ⭐ Superstar — big glowing golden star
                        ctx.shadowColor = "#ff0"; ctx.shadowBlur = 25;
                        let sg = ctx.createRadialGradient(0,0,2,0,0,16);
                        sg.addColorStop(0, "#fffde7");
                        sg.addColorStop(0.4, "#ffeb3b");
                        sg.addColorStop(1, "#f57f17");
                        ctx.fillStyle = sg;
                        ctx.strokeStyle = "#e65100"; ctx.lineWidth = 1.5;
                        // 5-pointed star (bigger)
                        ctx.beginPath();
                        for(let j=0; j<5; j++) {
                            ctx.lineTo(Math.cos((18+j*72)*Math.PI/180)*16, -Math.sin((18+j*72)*Math.PI/180)*16);
                            ctx.lineTo(Math.cos((54+j*72)*Math.PI/180)*7,  -Math.sin((54+j*72)*Math.PI/180)*7);
                        }
                        ctx.closePath();
                        ctx.fill(); ctx.stroke();
                        // Sparkle rays
                        ctx.save();
                        ctx.strokeStyle = "rgba(255,255,200,0.8)"; ctx.lineWidth = 1;
                        for(let ray=0; ray<8; ray++) {
                            ctx.save();
                            ctx.rotate(ray * Math.PI/4 + frames*0.05);
                            ctx.beginPath(); ctx.moveTo(17,0); ctx.lineTo(22,0); ctx.stroke();
                            ctx.restore();
                        }
                        ctx.restore();
                    }

                    ctx.restore();
                }
            }
        },
        
        update: function() {
            if(state.current !== state.game) return;

            // Progressive speed scaling
            if (currentGameMode === 'hardcore') {
                // FIXED HARDCORE SCALING (ignoring slider)
                this.dx = Math.min(4.0 + Math.floor(score.value / 3) * 0.4, 10);
                this.spawnInterval = Math.max(45, 60 - Math.floor(score.value / 4) * 2);
            } else {
                // Normal scale (respects slider)
                let baseSpeed = parseFloat(speedRange.value) || 2.5;
                this.dx = Math.min(baseSpeed + Math.floor(score.value / 5) * 0.3, 8.5);
                this.spawnInterval = Math.max(60, 100 - Math.floor(score.value / 5) * 3);
            }
            
            if(frames % this.spawnInterval === 0) {
                let isMoving = score.value > 5 && Math.random() > 0.6;
                // Stars are rarer: base 7% chance, types: coin(common), diamond(uncommon), super(rare)
                let roll = Math.random();
                let hasStar = score.value > 3 && roll > 0.95;
                let starType = 'coin';
                if (hasStar) {
                    let typeRoll = Math.random();
                    if (typeRoll > 0.85) starType = 'super';      // 15% of stars = super
                    else if (typeRoll > 0.5) starType = 'diamond'; // 35% of stars = diamond
                    else starType = 'coin';                         // 50% of stars = coin
                }

                this.position.push({
                    x: canvas.width,
                    y: this.h * (Math.random() * 0.6 + 0.9) * -0.5,
                    passed: false,
                    isMoving: isMoving,
                    moveDir: Math.random() > 0.5 ? 1 : -1,
                    hasStar: hasStar,
                    starType: starType,
                    starCollected: false
                });
            }
            
            for(let i = 0; i < this.position.length; i++) {
                let p = this.position[i];
                p.x -= this.dx;
                
                if (p.isMoving) {
                    p.y += p.moveDir * 0.8;
                    if (p.y > -this.h * 0.3) p.moveDir = -1;
                    if (p.y < -this.h * 0.9) p.moveDir = 1;
                }
                
                let bottomPipeYPos = p.y + this.h + this.gap;
                let hitRadius = bird.radius - 2; 

                if(bird.x + hitRadius > p.x && bird.x - hitRadius < p.x + this.w && 
                   bird.y + hitRadius > p.y && bird.y - hitRadius < p.y + this.h) {
                    gameOver();
                }
                
                if(bird.x + hitRadius > p.x && bird.x - hitRadius < p.x + this.w && 
                   bird.y + hitRadius > bottomPipeYPos && bird.y - hitRadius < bottomPipeYPos + this.h) {
                    gameOver();
                }
                
                if(!p.passed && p.x + this.w < bird.x - bird.radius) {
                    score.value += 1;
                    scoreDisplay.innerText = score.value;
                    p.passed = true;
                }
                
                if (p.hasStar && !p.starCollected) {
                    let starX = p.x + this.w / 2;
                    let starY = p.y + this.h + this.gap / 2;
                    let dist = Math.hypot(bird.x - starX, bird.y - starY);
                    if (dist < bird.radius + 15) {
                        p.starCollected = true;
                        let reward = p.starType === 'super' ? 500 : p.starType === 'diamond' ? 250 : 100;
                        coins += reward;
                        localStorage.setItem("flappy_coins", coins);
                        coinCountUI.innerText = coins;
                    }
                }
                
                if(p.x + this.w <= 0) {
                    this.position.shift();
                }
            }
        },
        
        reset: function() {
            this.position = [];
        }
    };

    // Зірки
    const stars = [];
    for(let i = 0; i < 40; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * (canvas.height * 0.7),
            size: Math.random() * 1.5,
            twinkle: Math.random() * Math.PI * 2
        });
    }

    function lerpColor(a, b, amount) { 
        var ah = parseInt(a.replace(/#/g, ''), 16),
            ar = ah >> 16, ag = ah >> 8 & 0xff, ab = ah & 0xff,
            bh = parseInt(b.replace(/#/g, ''), 16),
            br = bh >> 16, bg = bh >> 8 & 0xff, bb = bh & 0xff,
            rr = ar + amount * (br - ar),
            rg = ag + amount * (bg - ag),
            rb = ab + amount * (bb - ab);
        return '#' + ((1 << 24) + (rr << 16) + (rg << 8) + rb | 0).toString(16).slice(1);
    }

    const backgroundParallax = {
        layerX: 0,
        currentColors: ["#87CEEB", "#4682B4", "#2E8B57"],
        bgThemes: [
            ["#87CEEB", "#4682B4", "#2E8B57"],
            ["#FFA07A", "#FF6347", "#8B0000"],
            ["#1c1124", "#301d3d", "#9e5c65"],
            ["#0a0a2a", "#1a1a4a", "#2a2a6a"]
        ],
        draw: function() {
            let themeIdx = Math.floor(score.value / 5) % this.bgThemes.length;
            let targetTheme = this.bgThemes[themeIdx];
            
            for(let i=0; i<3; i++) {
                this.currentColors[i] = lerpColor(this.currentColors[i], targetTheme[i], 0.05);
            }
            
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, this.currentColors[0]);   
            grad.addColorStop(0.5, this.currentColors[1]); 
            grad.addColorStop(1, this.currentColors[2]);   
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "white";
            stars.forEach(s => {
                s.twinkle += 0.05;
                let alpha = (Math.sin(s.twinkle) + 1) / 2; 
                ctx.globalAlpha = 0.2 + alpha * 0.5; 
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            if(state.current === state.game) this.layerX -= pipes.dx * 0.2;
            
            ctx.fillStyle = "#1b1423";
            ctx.beginPath();
            let startX = this.layerX % (canvas.width * 2);
            ctx.moveTo(0, canvas.height);
            for(let i = 0; i <= canvas.width + 100; i+=20) {
                let waveX = i - startX;
                ctx.lineTo(i, canvas.height - 80 - Math.sin(waveX * 0.03) * 30 - Math.cos(waveX * 0.01) * 20);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();
        }
    };

    const fg = {
        h: 60,
        offset: 0,
        draw: function() {
            if(state.current === state.game) this.offset -= pipes.dx;
            
            let drawOffset = this.offset % 30;

            ctx.fillStyle = "#2c3e50";
            ctx.fillRect(0, canvas.height - this.h, canvas.width, this.h);
            
            ctx.strokeStyle = "#1a252f"; 
            ctx.lineWidth = 15;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - this.h + 8);
            ctx.lineTo(canvas.width, canvas.height - this.h + 8);
            ctx.stroke();

            ctx.fillStyle = "#1b1423";
            for(let i = 0; i < canvas.width / 30 + 1; i++) {
                ctx.fillRect(i * 30 + drawOffset, canvas.height - this.h + 16, 2, this.h);
            }
        }
    };

    const score = {
        value: 0
    };

    function gameOver() {
        state.current = state.over;
        
        let earned = score.value * 10;
        coins += earned;
        localStorage.setItem("flappy_coins", coins);
        coinCountUI.innerText = coins;
        earnedCoinsUI.innerText = earned;

        if (currentGameMode === 'hardcore') {
            if (score.value > myBestScoreHC) {
                myBestScoreHC = score.value;
                localStorage.setItem("flappy_best_hc", myBestScoreHC);
            }
        } else {
            if (score.value > myBestScore) {
                myBestScore = score.value;
                localStorage.setItem("flappy_best", myBestScore);
            }
        }
        
        if(window.saveDataToFirebase) window.saveDataToFirebase(coins, unlockedSkins, currentSkinId, myBestScore, myBestScoreHC);

        finalScore.innerText = score.value;
        gameOverMenu.classList.remove("hidden");
        scoreDisplay.style.display = "none";
    }

    function draw() {
        backgroundParallax.draw(); 
        
        if(state.current === state.menu) {
            fg.draw();
            bird.y = 200 + Math.sin(frames * 0.08) * 6;
            bird.draw();
        } else {
            pipes.draw();
            fg.draw();
            bird.draw();
        }
    }

    function update() {
        if(state.current === state.game) {
            bird.update();
            pipes.update();
        } else if (state.current === state.over) {
            if(bird.y < canvas.height - fg.h - bird.radius) {
                bird.update();
            }
        }
    }

    function loop() {
        update();
        draw();
        frames++;
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
